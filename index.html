<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pavilion Configurator</title>
    <style>
      html, body, #root { margin: 0; height: 100%; }
      .boot-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #6e6e73;
        background: #f5f5f7;
      }
      .boot-error {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 560px;
        margin: 0 auto;
        padding: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1d1d1f;
        background: #f5f5f7;
        min-height: 100%;
        justify-content: center;
      }
      .boot-error h1 { margin: 0; font-size: 22px; }
      .boot-error p { margin: 0; color: #6e6e73; line-height: 1.5; }
      .boot-error code {
        background: #e8e8ed;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 14px;
      }
      .boot-error ol { margin: 0; padding-left: 20px; color: #6e6e73; }
      .boot-error li { margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loading">Loading Pavilion Configurator…</div>
    </div>

    <script>
      function isGitHubPages() {
        return location.hostname.endsWith('github.io')
      }

      function showBootError(message, tips) {
        var root = document.getElementById('root')
        if (!root || !root.querySelector('.boot-loading')) return

        var tipsHtml = tips.map(function (tip) {
          return '<li>' + tip + '</li>'
        }).join('')

        root.innerHTML =
          '<div class="boot-error">' +
          '<h1>App did not start</h1>' +
          '<p>' + message + '</p>' +
          '<ol>' + tipsHtml + '</ol>' +
          '</div>'
      }

      window.addEventListener('error', function (event) {
        if (isGitHubPages()) {
          showBootError(
            'The production build failed to load.',
            [
              'Check GitHub Actions for a failed deploy workflow',
              'In repo Settings → Pages, set Source to <code>GitHub Actions</code>',
              'Push to <code>main</code> to trigger a new deploy',
            ],
          )
        } else {
          showBootError(
            event.message || 'A script failed to load.',
            [
              'Double-click <code>start.bat</code> in the project folder',
              'Or run <code>npm install</code> then <code>npm run dev</code>',
              'Open <code>http://localhost:5173</code> (not the HTML file directly)',
            ],
          )
        }
      })

      setTimeout(function () {
        if (!document.querySelector('.boot-loading')) return

        if (isGitHubPages()) {
          showBootError(
            'This site needs a built deploy — raw source files cannot run on GitHub Pages.',
            [
              'Go to repo Settings → Pages → Build and deployment → Source: <code>GitHub Actions</code>',
              'Push this repo to <code>main</code> (the deploy workflow will run automatically)',
              'After the workflow succeeds, refresh this page',
            ],
          )
        } else {
          showBootError(
            'The dev server is not running or this page was opened incorrectly.',
            [
              'Double-click <code>start.bat</code> in the project folder',
              'Or run <code>npm install</code> then <code>npm run dev</code>',
              'Open <code>http://localhost:5173</code> (not the HTML file directly)',
            ],
          )
        }
      }, 4000)
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
