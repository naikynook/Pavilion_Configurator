<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pavilion Configurator</title>
    <style>
      html, body, #root { margin: 0; height: 100%; }
      .boot-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #6e6e73;
        background: #f5f5f7;
      }
      .boot-error {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 560px;
        margin: 0 auto;
        padding: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1d1d1f;
        background: #f5f5f7;
        min-height: 100%;
        justify-content: center;
      }
      .boot-error h1 { margin: 0; font-size: 22px; }
      .boot-error p { margin: 0; color: #6e6e73; line-height: 1.5; }
      .boot-error code {
        background: #e8e8ed;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 14px;
      }
      .boot-error ol { margin: 0; padding-left: 20px; color: #6e6e73; }
      .boot-error li { margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loading">Loading Pavilion Configurator…</div>
    </div>

    <script>
      function showBootError(message) {
        var root = document.getElementById('root')
        if (!root || !root.querySelector('.boot-loading')) return
        root.innerHTML =
          '<div class="boot-error">' +
          '<h1>App did not start</h1>' +
          '<p>' + message + '</p>' +
          '<ol>' +
          '<li>Double-click <code>start.bat</code> in the project folder</li>' +
          '<li>Or run <code>npm install</code> then <code>npm run dev</code></li>' +
          '<li>Open <code>http://localhost:5173</code> (not the HTML file directly)</li>' +
          '</ol>' +
          '<p>Do not use Live Server or open <code>index.html</code> directly.</p>' +
          '</div>'
      }

      window.addEventListener('error', function (event) {
        showBootError(event.message || 'A script failed to load.')
      })

      setTimeout(function () {
        if (document.querySelector('.boot-loading')) {
          showBootError('The dev server is not running or this page was opened incorrectly.')
        }
      }, 4000)
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
